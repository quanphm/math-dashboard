name: math

services:
  database:
    container_name: math-db
    image: postgres:18-alpine
    restart: always
    ports:
      - 5432:5432
    environment:
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${DB_NAME}
    command:
      - -c
      - listen_addresses=*
      - -c
      - wal_level=logical
    volumes:
      - pg_data:/var/lib/postgresql/18/docker

  pgbouncer:
    container_name: math-pgbouncer
    image: edoburu/pgbouncer:latest
    restart: always
    ports:
      - 6432:5432
    environment:
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_HOST=database
      - DB_NAME=${DB_NAME}
      - POOL_MODE=session
      - MAX_CLIENT_CONN=100
      - DEFAULT_POOL_SIZE=20
      - MIN_POOL_SIZE=5
      - RESERVE_POOL_SIZE=5
      - MAX_DB_CONNECTIONS=25
      - AUTH_TYPE=scram-sha-256
    depends_on:
      - database

  valkey:
    container_name: math-valkey
    image: valkey/valkey:9.0.1-alpine
    restart: always
    ports:
      - 6379:6379
    command:
      - valkey-server
      - --save 60 1
      - --appendonly yes
      - --loglevel warning

volumes:
  pg_data:
    driver: local
